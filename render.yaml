services:
  - type: web
    name: stadiummind-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: 'cd backend && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stadiummind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: stadiummind-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # Update for production

  - type: redis
    name: stadiummind-redis
    region: ohio
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: stadiummind-db
    region: ohio
    plan: free
    databaseName: stadium_mind
    user: stadium_admin
